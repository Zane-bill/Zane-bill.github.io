<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<title>张标的个人主页 Zanebill's Personal Homepage</title>
	<link rel="shortcut icon" type="image/x-icon" href="images/Z.png">
	<!--<link href="css/bootstrap.css" rel='stylesheet' type='text/css'/>-->
	<!--引入音乐 开始-->
	<link rel="stylesheet" type="text/css" href="css/m-details.css" />
	<link rel="stylesheet" type="text/css" href="css/font-awesome.min.css">
	<!--引入音乐 结束-->
	<style>

		html, body {
			width: 100%;
			height: 100%;
		}

		body {
			background: url("images/bg_1.jpg") no-repeat;
			background-size: cover;
		}

		.cf {
			content: "";
			clear: both;
			display: block;
			overflow: hidden;
		}

		.cf:before, .cf:after {
			display: block;
			overflow: hidden;
			content: "";
		}

		.container {
			width: 60%;
			height: 35%;
			background: rgba(0,0,0,0.4);
			border-radius: 3%;

			position: absolute;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;
			margin: auto;
		}

		.head {
			color: white;
			text-align: center;
			font-family:"宋体" ;
			font-size: 12px;
		}
		.head p{
			font-family: cursive;
		}

		.footer {
			width: 100%;
			position: absolute;
			bottom: 0;
		}

		ul {
			text-align: center;
		}

		ul, li, a {
			list-style: none;
			text-decoration: none;
			display: inline-block;
		}

		.github {
			width: 30px;
			height: 30px;
			background: url("./images/git.png") no-repeat;
			background-size: cover;
			margin-right: 10px;
		}

		.github:hover {
			width: 30px;
			height: 30px;
			background: url("./images/git_1.png") no-repeat;
			background-size: cover;
			display: inline-block;
			margin-right: 10px;
		}

		.csdn {
			width: 30px;
			height: 30px;
			background: url("./images/csdn.png") no-repeat;
			margin-right: 10px;
			background-size: cover;
		}

		.csdn:hover {
			width: 30px;
			height: 30px;
			background: url("./images/csdn (1).png") no-repeat;
			display: inline-block;
			margin-right: 10px;
			background-size: cover;
		}
		.more_a{
			color: white;
			position: absolute;
			top: 0;
			right: 20px;
		}
	</style>
</head>
<body oncontextmenu=self.event.returnValue=false>
<div class="container">
	<div class="head">
		<h1>张标的个人主页</h1>
		<p>Zanebill's Personal Homepage</p>
	</div>
	<div class="content"></div>
	<div class="m-content">
		<!--播放器-->
		<div class="m-player">
			<div class="m-player-details">
				<!--效果html开始-->
				<div id="player">
					<div class="ctrl">
						<div class="control">
							<div class="left lefticon">
								<div class="playback icon"></div>
							</div>
							<div class="timer">0:00</div>
							<div class="progress">
								<div class="slider">
									<div class="loaded"></div>
									<div class="pace"></div>
								</div>
							</div>

							<div class="volume right">
								<div class="mute icon left"></div>
								<div class="slider left">
									<div class="pace"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!--<div class="m-song-details">-->
			<!--<div class="m-song-name">BGM:Take Me to Infinit</div>-->
		<!--</div>-->
	</div>
	<div class="footer ">
		<ul class="cf">
			<li><a class="github" href="https://github.com/Zane-bill" target="_blank" title="github"></a>
			</li>
			<li><a class="csdn" href="https://blog.csdn.net/weixin_42795449" target="_blank" title="csdn"></a></li>
		</ul>
		<div class="more">
			<a class="more_a" href="www.zanebill.xyz/more " target="_blank">更多</a>
		</div>
	</div>
</div>


</body>
<script type="text/javascript" src="js/jquery-1.7.2.min.js"></script>
<script type="text/javascript" src="js/jquery-ui-1.8.17.custom.min.js"></script>
<script type="text/javascript" src="js/m-details.js"></script>
</html>
